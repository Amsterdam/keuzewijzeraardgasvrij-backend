name: 'Install, lint, test & build'
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install setuptools
      run: python3 -m pip install setuptools
    - name: Linting
      run: bash bin/cleanup_pre_commit.sh
    - name: Build Docker image
      run: docker compose -f docker-compose.local.yml build
    - name: Create Docker network
      run: docker network create keuzewijzeraardgasvrij_network
    - name: Start images
      run: docker compose -f docker-compose.local.yml -d
    - name: Run Tests
      run: docker compose exec -T keuzewijzeraardgasvrij-backend python manage.py test -v 2

    - if: ${{ failure() }}
      name: "ON FAILURE: Which containers were running while failing?"
      run: docker ps -a

    - if: ${{ failure() }}
      name: "ON FAILURE: Backend logs"
      run: docker logs keuzewijzeraardgasvrij-backend
